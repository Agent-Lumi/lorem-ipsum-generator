<script>
// Import from file
const importBtn = document.createElement('button');
importBtn.textContent = '📁 Import';
importBtn.onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const textArea = document.querySelector('textarea');
            if (textArea) textArea.value = e.target.result;
        };
        reader.readAsText(file);
    };
    input.click();
};
document.querySelector('.container')?.appendChild(importBtn);
</script>
<script>
// API integration ready
const API = {
    async fetch(url, options = {}) {
        const response = await fetch(url, options);
        return response.json();
    }
};
</script>
<script>
// Dark mode toggle
const darkModeToggle = document.createElement('button');
darkModeToggle.textContent = '🌙';
darkModeToggle.style.cssText = 'position:fixed;top:20px;right:20px;background:none;border:none;font-size:24px;cursor:pointer;z-index:1000;';
darkModeToggle.onclick = () => {
    document.body.classList.toggle('dark-mode');
    darkModeToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
};
document.body.appendChild(darkModeToggle);

// Check saved preference
if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
    darkModeToggle.textContent = '☀️';
}
</script>

</style>
<script>
// Export functionality
function exportData(format) {
    const data = document.querySelector('textarea, input')?.value || document.body.innerText;
    const blob = new Blob([data], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'export.' + format;
    a.click();
    URL.revokeObjectURL(url);
}
</script>

<script>
// Auto-save to localStorage
const saveKey = 'app-data-' + location.pathname;
const saveData = () => {
    const data = { timestamp: Date.now(), inputs: {} };
    document.querySelectorAll('input, textarea').forEach(el => {
        data.inputs[el.id || el.name] = el.value;
    });
    localStorage.setItem(saveKey, JSON.stringify(data));
};
const loadData = () => {
    const saved = localStorage.getItem(saveKey);
    if (saved) {
        const data = JSON.parse(saved);
        Object.entries(data.inputs).forEach(([key, value]) => {
            const el = document.getElementById(key) || document.querySelector('[name="' + key + '"]');
            if (el) el.value = value;
        });
    }
};
document.addEventListener('input', saveData);
document.addEventListener('DOMContentLoaded', loadData);
</script>
<script>
// Templates gallery
const templates = [
    { name: 'Default', apply: () => {} },
    { name: 'Minimal', apply: () => document.body.style.fontFamily = 'system-ui, sans-serif' }
];
const templateSelect = document.createElement('select');
templates.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = t.name;
    templateSelect.appendChild(opt);
});
templateSelect.onchange = (e) => {
    const template = templates.find(t => t.name === e.target.value);
    if (template) template.apply();
};
document.querySelector('.container')?.appendChild(templateSelect);
</script>
<script>
// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
        switch(e.key) {
            case 's': e.preventDefault(); console.log('Save shortcut'); break;
            case 'r': e.preventDefault(); location.reload(); break;
            case 'f': e.preventDefault(); document.querySelector('input')?.focus(); break;
        }
    }
});
</script>
<script>
// Simple tutorial
const tutorialSteps = [
    { selector: 'h1', text: 'Welcome! This is the main title.' },
    { selector: 'button', text: 'Click here to perform actions.' }
];
let currentStep = 0;
function showTutorial() {
    if (currentStep < tutorialSteps.length) {
        const step = tutorialSteps[currentStep];
        const el = document.querySelector(step.selector);
        if (el) {
            const tooltip = document.createElement('div');
            tooltip.textContent = step.text;
            tooltip.style.cssText = 'position:absolute;background:#6f42c1;color:white;padding:10px;border-radius:5px;z-index:1000;';
            el.style.position = 'relative';
            el.appendChild(tooltip);
            setTimeout(() => tooltip.remove(), 3000);
        }
        currentStep++;
    }
}
// Show tutorial on first visit
if (!localStorage.getItem('tutorial-shown')) {
    setTimeout(showTutorial, 1000);
    localStorage.setItem('tutorial-shown', 'true');
}
</script>
